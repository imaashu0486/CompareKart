name: comparekart_app
description: CompareKart - Real-time product price comparison app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # HTTP and Networking
  http: ^1.1.0
  dio: ^5.3.0

  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # URL Launcher
  url_launcher: ^6.1.0

  # Image Loading
  cached_network_image: ^3.2.0

  # Connectivity
  connectivity_plus: ^5.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0

  # UI/UX
  fluttertoast: ^8.2.0
  loading_animation_widget: ^1.2.0
  shimmer: ^3.0.0

  # Date and Time
  intl: ^0.18.0

  # Logging
  logger: ^2.0.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - .env
